<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Mood Ring</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Rajdhani:wght@500&display=swap" rel="stylesheet">
</head>
<body>
    <div id="loader">
        <div class="loader-orb"></div>
    </div>

    <div id="app" class="hidden">
        <canvas id="globe-canvas"></canvas>

        <header id="header">
            <div class="logo-text">
                <h1 class="logo-title">GLOBAL MOOD RING</h1>
            </div>
            <div class="header-right">
                <button id="btn-audio" onclick="window.toggleAudio()">
                    <span id="audio-icon-glyph">◎</span> Soundscape
                </button>
            </div>
        </header>

        <div id="aura-overlay" class="hidden">
            <div id="aura-card" class="glass-panel">
                <button class="close-btn" onclick="window.closeAura()">×</button>
                <div id="aura-bg"></div>
                <div class="aura-content">
                    <p class="aura-eyebrow">YOUR GLOBAL SIGNAL</p>
                    <h2 id="aura-word">MOOD</h2>
                    <p id="aura-loc">City, Country</p>
                    <div class="aura-line"></div>
                    <button class="share-btn" onclick="window.shareAura()">SHARE SIGNAL</button>
                </div>
            </div>
        </div>

        <div id="input-panel" class="glass-panel">
            <div class="input-row">
                <input id="mood-input" type="text" placeholder="How are you feeling?" autocomplete="off">
                <button id="btn-send" onclick="window.submitMood()">SEND</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="script.js"></script>
</body>
</html>
